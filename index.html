<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Vortex Key</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap');

body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at top, #001a2f, #000);
  font-family: 'Orbitron', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* partículas */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: repeating-radial-gradient(circle, #00ccff22 1px, transparent 2px);
  animation: move 20s linear infinite;
  opacity: 0.2;
}

@keyframes move {
  from { transform: translate(0,0); }
  to { transform: translate(-200px, -200px); }
}

.box {
  position: relative;
  background: rgba(0, 10, 25, 0.85);
  border-radius: 20px;
  padding: 50px;
  text-align: center;
  box-shadow: 
    0 0 20px #00ccff55,
    0 0 60px #0077ff33,
    inset 0 0 20px #00ccff22;
  backdrop-filter: blur(15px);
}

h1 {
  color: #00ccff;
  text-shadow: 0 0 10px #00ccff, 0 0 30px #0077ff;
  margin-bottom: 25px;
}

button {
  padding: 14px 30px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg, #00ccff, #0077ff);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 15px #00ccff;
}

button:hover {
  transform: scale(1.08);
  box-shadow: 0 0 30px #00ccff, 0 0 60px #0077ff;
}

/* key */
.key {
  margin-top: 25px;
  font-size: 24px;
  letter-spacing: 3px;
  color: #00ffcc;
  text-shadow: 0 0 10px #00ccff;
  opacity: 0;
}

/* efeito digitando */
.reveal {
  opacity: 1;
  border-right: 2px solid #00ccff;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
  animation: typing 2s steps(10) forwards, blink 0.6s infinite;
}

@keyframes typing {
  from { width: 0 }
  to { width: 120px }
}

@keyframes blink {
  50% { border-color: transparent }
}

.msg {
  margin-top: 10px;
  color: #00ff88;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="box">
  <h1>🔐 VORTEX ACCESS</h1>

  <button onclick="copiar()">COPIAR KEY</button>

  <div id="key" class="key"></div>
  <div id="msg" class="msg"></div>
</div>

<script>
function copiar() {
  const key = "Vortex83";

  // copiar com fallback
  if (navigator.clipboard) {
    navigator.clipboard.writeText(key).then(() => mostrar(key));
  } else {
    let input = document.createElement("textarea");
    input.value = key;
    document.body.appendChild(input);
    input.select();
    document.execCommand("copy");
    document.body.removeChild(input);
    mostrar(key);
  }
}

function mostrar(key) {
  const keyEl = document.getElementById("key");
  keyEl.innerText = key;
  keyEl.classList.add("reveal");

  document.getElementById("msg").innerText = "✔ Key copiada com sucesso!";
}
</script>

</body>
</html>
