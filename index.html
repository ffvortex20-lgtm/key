<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Vortex Key</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap');

body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at top, #001a2f, #000);
  font-family: 'Orbitron', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}

.box {
  background: rgba(0, 10, 25, 0.85);
  border-radius: 20px;
  padding: 50px;
  text-align: center;
  box-shadow: 0 0 20px #00ccff55, 0 0 60px #0077ff33;
}

h1 {
  color: #00ccff;
  text-shadow: 0 0 10px #00ccff;
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg, #00ccff, #0077ff);
  color: white;
  cursor: pointer;
  margin-top: 15px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.08);
  box-shadow: 0 0 20px #00ccff;
}

.key {
  margin-top: 20px;
  font-size: 22px;
  color: #00ffcc;
  opacity: 0;
  transition: 0.4s;
}

.reveal {
  opacity: 1;
}

.msg {
  margin-top: 10px;
  color: #00ff88;
}

/* botões sociais */
.links {
  margin-top: 25px;
}

.links a {
  display: block;
  margin-top: 10px;
  text-decoration: none;
  padding: 12px;
  border-radius: 8px;
  background: #00ccff22;
  color: #00ccff;
  transition: 0.3s;
}

.links a:hover {
  background: #00ccff;
  color: black;
  box-shadow: 0 0 15px #00ccff;
}
</style>
</head>

<body>

<div class="box">
  <h1>🔐 VORTEX ACCESS</h1>

  <button onclick="copiar()">COPIAR KEY</button>

  <div id="key" class="key">Vortex23</div>
  <div id="msg" class="msg"></div>

  <div class="links">
    <a href="https://chat.whatsapp.com/DrlOTtZar6hIk7wRf9dMVn" target="_blank">
      🚀 Entrar no Grupo
    </a>

    <a href="https://whatsapp.com/channel/0029VbC7FWcJENxsIOsndS15" target="_blank">
      📢 Seguir Canal
    </a>

    <a href="https://youtube.com/@loshackerofcll?si=cAhh0gUaeuawY8hb" target="_blank">
      ▶️ Inscrever no YouTube
    </a>
  </div>
</div>

<script>
function copiar() {
  const key = "Vortex83";

  if (navigator.clipboard) {
    navigator.clipboard.writeText(key).then(() => mostrar());
  } else {
    let input = document.createElement("textarea");
    input.value = key;
    document.body.appendChild(input);
    input.select();
    document.execCommand("copy");
    document.body.removeChild(input);
    mostrar();
  }
}

function mostrar() {
  document.getElementById("msg").innerText = "✔ Key copiada!";
  document.getElementById("key").classList.add("reveal");
}
</script>

</body>
</html>
